spring.application.name=college-admission-server
# Server Configuration
server.port=8080
server.servlet.context-path=/api

# MongoDB Configuration
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=college_admission
spring.data.mongodb.authentication-database=admin

# Cloudinary Configuration
cloudinary.cloud-name=

cloudinary.api-key=

cloudinary.api-secret=

# JWT Configuration
jwt.secret=
jwt.expiration=86400000

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Document Processing Server Configuration
# Replace with actual IP address of the machine running Python server
document.processing.server.url=http://192.168.1.101:5000
document.processing.server.endpoint=/api/process-doc
document.processing.server.timeout=30000

# Logging
logging.level.com.college.admission=DEBUG
logging.level.org.springframework.web=DEBUG